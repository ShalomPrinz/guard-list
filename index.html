<!doctype html>
<html lang="he" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/app-icon.png" />
    <title>רשימת שמירה</title>
    <script>
      (function () {
        var t = localStorage.getItem('theme')
        if (t === 'light') {
          document.documentElement.classList.remove('dark')
        } else if (t === null) {
          // No stored preference — follow system preference
          if (!window.matchMedia('(prefers-color-scheme: dark)').matches) {
            document.documentElement.classList.remove('dark')
          }
        }
        // t === 'dark' or system prefers dark: keep class="dark" that is already set
      })()
    </script>
  </head>
  <body class="bg-gray-50 text-gray-900 dark:bg-gray-950 dark:text-gray-100 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
